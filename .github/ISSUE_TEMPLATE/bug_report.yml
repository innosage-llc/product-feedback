name: Bug Report
description: Report a reproducible bug or error.
title: "[BUG]: "
labels: ["type: bug", "status: needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please provide as much detail as possible so we can reproduce it. **Do not include any API keys or secrets.**
  - type: input
    id: product
    attributes:
      label: Product
      description: Which product is affected? Use the product name if you know it; we'll map it to a product label during triage.
      placeholder: e.g., FrameCut Editor
    validations:
      required: true
  - type: input
    id: summary
    attributes:
      label: Bug Summary
      description: A clear and concise description of what the bug is.
      placeholder: e.g., The save button is unresponsive when editing a draft.
    validations:
      required: true
  - type: textarea
    id: happened
    attributes:
      label: What happened?
      description: Tell us what went wrong.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      description: Tell us what should have happened instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Please provide exact steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: input
    id: environment_os
    attributes:
      label: Operating System
      placeholder: e.g., macOS Sonoma 14.2, Windows 11
    validations:
      required: true
  - type: input
    id: environment_browser
    attributes:
      label: Browser & Extension Version
      description: If applicable, list your browser version and the extension/app build number.
      placeholder: e.g., Chrome 120.0.6099.109, Extension v1.2.4
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs or Screenshots
      description: Paste terminal output, console errors, or drag and drop screenshots here.
    validations:
      required: false
  - type: checkboxes
    id: terms
    attributes:
      label: Security Checklist
      options:
        - label: I have ensured no sensitive data, API keys, or private secrets are included in this report.
          required: true
